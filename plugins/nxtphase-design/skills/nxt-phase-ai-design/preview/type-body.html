<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg-1);padding:38px 44px;box-sizing:border-box;font-family:var(--font-body)}
  .line{font-size:26px;color:var(--off-black);margin:0 0 12px;line-height:1.3}
  .w4{font-weight:400}.w5{font-weight:500}.w6{font-weight:600}
  .tag{font-family:var(--font-body);font-size:13px;color:var(--stone);font-weight:400;margin-left:14px}
  .foot{margin-top:18px;border-top:1px solid var(--hairline);padding-top:14px;font-size:13px;color:var(--stone)}
</style></head>
<body>
  <p class="line w4">Senior guidance and real delivery.<span class="tag">Regular · 400</span></p>
  <p class="line w5">Senior guidance and real delivery.<span class="tag">Medium · 500</span></p>
  <p class="line w6">Senior guidance and real delivery.<span class="tag">Semibold · 600</span></p>
  <div class="foot">Switzer — Body &amp; UI · geometric humanist sans · never letter-spaced in body</div>
</body></html>
