<!-- @dsCard group="Colors" -->
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg-1);padding:34px;box-sizing:border-box;font-family:var(--font-body)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .sw{display:flex;flex-direction:column;gap:10px}
  .chip{height:96px;border-radius:var(--r-lg);border:1px solid var(--hairline)}
  .nm{font-size:14px;font-weight:500;color:var(--off-black)}
  .hx{font-size:12px;color:var(--stone)}
  .note{margin-top:20px;font-size:12.5px;color:var(--stone);border-top:1px solid var(--hairline);padding-top:12px}
</style></head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--signal-orange)"></div><div class="nm">Signal Orange</div><div class="hx">#E86B10</div></div>
    <div class="sw"><div class="chip" style="background:var(--postit-blue)"></div><div class="nm">Post-it Blue</div><div class="hx">#86C0D5</div></div>
    <div class="sw"><div class="chip" style="background:var(--postit-pink)"></div><div class="nm">Post-it Pink</div><div class="hx">#F7DFDE</div></div>
  </div>
  <div class="note">Max one supporting color per section · two per presentation · orange never as body text on cream</div>
</body></html>
