<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg-1);padding:38px 44px;box-sizing:border-box}
  .ov{font-family:var(--font-body);font-weight:500;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--stone)}
  .stack{display:flex;flex-direction:column;gap:16px}
  .ex{display:flex;align-items:center;gap:18px}
  .num{font-family:var(--font-display);font-style:italic;font-size:30px;color:var(--signal-orange);line-height:1}
  .foot{margin-top:22px;border-top:1px solid var(--hairline);padding-top:14px;font-family:var(--font-body);font-size:13px;color:var(--stone)}
</style></head>
<body>
  <div class="stack">
    <div class="ov">01 — Reference</div>
    <div class="ov">Social Proof · Vertrouwd door</div>
    <div class="ex"><span class="num">01</span><span class="ov" style="color:var(--off-black)">Numerals — Editorial italic, Signal Orange</span></div>
  </div>
  <div class="foot">Overlines &amp; labels only · 11px · medium · 0.12em tracking</div>
</body></html>
