<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg-1);padding:32px;box-sizing:border-box;font-family:var(--font-body)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .tile{aspect-ratio:1;border-radius:var(--r-xl);display:flex;align-items:center;justify-content:center;border:1px solid var(--hairline)}
  .tile img{width:54%;height:54%}
  .cap{font-size:12.5px;color:var(--off-black);margin-top:10px;text-align:center;font-weight:500}
  .col{display:flex;flex-direction:column}
</style></head>
<body>
  <div class="grid">
    <div class="col"><div class="tile" style="background:var(--surface-2)"><img src="../assets/icons/icon-a.svg"></div><div class="cap">Cream tile</div></div>
    <div class="col"><div class="tile" style="background:var(--soft-mint)"><img src="../assets/icons/icon-b.svg"></div><div class="cap">Soft Mint</div></div>
    <div class="col"><div class="tile" style="background:var(--soft-peach)"><img src="../assets/icons/icon-c.svg"></div><div class="cap">Soft Peach</div></div>
    <div class="col"><div class="tile" style="background:var(--postit-blue)"><img src="../assets/icons/icon-d.svg"></div><div class="cap">Post-it Blue</div></div>
  </div>
</body></html>
