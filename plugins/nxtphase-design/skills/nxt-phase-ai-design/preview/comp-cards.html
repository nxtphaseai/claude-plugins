<!-- @dsCard group="Components" -->
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg-1);padding:32px;box-sizing:border-box;font-family:var(--font-body)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .card{background:#fff;border:1px solid var(--hairline);border-radius:var(--r-lg);padding:24px;box-shadow:var(--shadow-md)}
  .n{font-family:var(--font-display);font-style:italic;font-size:30px;color:var(--signal-orange);line-height:1}
  .t{font-family:var(--font-display);font-size:21px;color:var(--off-black);margin:14px 0 8px;line-height:1.1}
  .b{font-size:14px;color:var(--stone);line-height:1.5;margin:0}
</style></head>
<body>
  <div class="grid">
    <div class="card">
      <div class="n">01</div>
      <div class="t">AI zonder hype.</div>
      <p class="b">Helder advies over wat realistisch is — en wat niet.</p>
    </div>
    <div class="card">
      <div class="n">02</div>
      <div class="t">Waarde eerst.</div>
      <p class="b">Eerst meten waar AI het meeste verschil maakt.</p>
    </div>
  </div>
</body></html>
