<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg-1);padding:34px;box-sizing:border-box;font-family:var(--font-body)}
  .row{display:flex;gap:18px;align-items:stretch}
  .cell{flex:1;border-radius:var(--r-lg);border:1px solid var(--hairline);display:flex;align-items:center;justify-content:center;padding:26px 0}
  .cell img{height:46px;width:auto}
  .cap{text-align:center;font-size:12px;color:var(--stone);margin-top:10px}
  .col{flex:1;display:flex;flex-direction:column}
  .note{margin-top:20px;font-size:12.5px;color:var(--stone);border-top:1px solid var(--hairline);padding-top:12px}
</style></head>
<body>
  <div class="row">
    <div class="col"><div class="cell" style="background:#fff"><img src="../assets/logos/mark-off-black.svg"></div><div class="cap">Off Black</div></div>
    <div class="col"><div class="cell" style="background:var(--surface-2)"><img src="../assets/logos/mark-signal-green.svg"></div><div class="cap">Signal Green</div></div>
    <div class="col"><div class="cell" style="background:var(--off-black)"><img src="../assets/logos/mark-cream.svg"></div><div class="cap">Cream</div></div>
    <div class="col"><div class="cell" style="background:#fff"><img src="../assets/logos/mark-stone.svg"></div><div class="cap">Stone</div></div>
  </div>
  <div class="note">"The Shift" — two overlapping chevrons. Mark may stand alone where space is tight (min 24px).</div>
</body></html>
