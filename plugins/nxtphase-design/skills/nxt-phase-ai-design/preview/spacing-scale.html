<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg-1);padding:34px;box-sizing:border-box;font-family:var(--font-body)}
  .r{display:flex;align-items:center;gap:16px;margin-bottom:9px}
  .bar{height:16px;background:var(--signal-green);border-radius:3px}
  .lab{font-size:12px;color:var(--stone);width:78px;flex:none}
  .note{margin-top:14px;font-size:12.5px;color:var(--stone);border-top:1px solid var(--hairline);padding-top:12px}
</style></head>
<body>
  <div class="r"><div class="lab">1 · 4px</div><div class="bar" style="width:4px"></div></div>
  <div class="r"><div class="lab">2 · 8px</div><div class="bar" style="width:8px"></div></div>
  <div class="r"><div class="lab">3 · 12px</div><div class="bar" style="width:12px"></div></div>
  <div class="r"><div class="lab">4 · 16px</div><div class="bar" style="width:16px"></div></div>
  <div class="r"><div class="lab">5 · 24px</div><div class="bar" style="width:24px"></div></div>
  <div class="r"><div class="lab">6 · 32px</div><div class="bar" style="width:32px"></div></div>
  <div class="r"><div class="lab">7 · 48px</div><div class="bar" style="width:48px"></div></div>
  <div class="r"><div class="lab">8 · 64px</div><div class="bar" style="width:64px"></div></div>
  <div class="note">8px base grid · systematic Rams alignment · generous negative space</div>
</body></html>
