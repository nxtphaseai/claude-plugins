<!-- @dsCard group="Colors" -->
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:#ffffff;padding:34px;box-sizing:border-box;font-family:var(--font-body)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .sw{display:flex;flex-direction:column;gap:10px}
  .chip{height:104px;border-radius:var(--r-lg);border:1px solid var(--hairline)}
  .nm{font-size:14px;font-weight:500;color:var(--off-black)}
  .hx{font-size:12px;color:var(--stone)}
</style></head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--bg-1)"></div><div class="nm">Background 1</div><div class="hx">#F9F6F1 · page base</div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-1)"></div><div class="nm">Surface 1</div><div class="hx">#F7F3ED · raised</div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-2)"></div><div class="nm">Surface 2 / Cream</div><div class="hx">#F5F0E8 · tile</div></div>
  </div>
</body></html>
