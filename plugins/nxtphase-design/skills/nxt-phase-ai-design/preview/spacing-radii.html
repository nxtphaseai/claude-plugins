<!-- @dsCard group="Spacing" -->
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg-1);padding:34px;box-sizing:border-box;font-family:var(--font-body)}
  .row{display:flex;gap:20px;align-items:flex-end}
  .sw{display:flex;flex-direction:column;gap:10px;align-items:center}
  .box{width:96px;height:78px;background:var(--surface-2);border:1px solid var(--hairline-strong)}
  .nm{font-size:12.5px;color:var(--off-black);font-weight:500}
  .sub{font-size:11px;color:var(--stone)}
  .note{margin-top:22px;font-size:12.5px;color:var(--stone);border-top:1px solid var(--hairline);padding-top:12px}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="box" style="border-radius:8px"></div><div class="nm">sm · 8</div></div>
    <div class="sw"><div class="box" style="border-radius:12px"></div><div class="nm">md · 12</div></div>
    <div class="sw"><div class="box" style="border-radius:16px"></div><div class="nm">lg · 16</div></div>
    <div class="sw"><div class="box" style="border-radius:24px"></div><div class="nm">xl · 24</div><div class="sub">cards / tiles</div></div>
  </div>
  <div class="note">Soft, generous corners — never pills. Tile radius matches the 24px icon-grid corner.</div>
</body></html>
