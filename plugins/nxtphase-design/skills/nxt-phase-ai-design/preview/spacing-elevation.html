<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg-1);padding:38px 34px;box-sizing:border-box;font-family:var(--font-body)}
  .row{display:flex;gap:30px}
  .sw{display:flex;flex-direction:column;gap:14px;align-items:center}
  .box{width:130px;height:80px;background:#fff;border-radius:var(--r-lg)}
  .nm{font-size:12.5px;color:var(--off-black);font-weight:500}
  .note{margin-top:26px;font-size:12.5px;color:var(--stone);border-top:1px solid var(--hairline);padding-top:12px}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="nm">sm</div></div>
    <div class="sw"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="nm">md</div></div>
    <div class="sw"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="nm">lg</div></div>
  </div>
  <div class="note">Warm-brown tinted, low opacity (rgba 61,43,31). Elevation is a whisper — Braun product, never glossy.</div>
</body></html>
