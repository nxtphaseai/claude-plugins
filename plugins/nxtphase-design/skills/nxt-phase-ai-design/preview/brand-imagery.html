<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{margin:0;font-family:var(--font-body)}
  .grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:0;height:200px}
  .cell{position:relative;overflow:hidden}
  .cell img{width:100%;height:100%;object-fit:cover;display:block}
  .tag{position:absolute;left:14px;bottom:12px;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,0.5)}
</style></head>
<body>
  <div class="grid">
    <div class="cell"><img src="../assets/images/workspace-1.jpg"><div class="tag">Workspace · collaboration</div></div>
    <div class="cell"><img src="../assets/images/dimensional-1.jpg"><div class="tag">Dimensional</div></div>
    <div class="cell"><img src="../assets/images/still-life-1.jpg"><div class="tag">Still life</div></div>
  </div>
</body></html>
