<!-- @dsCard group="Colors" -->
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg-1);padding:34px;box-sizing:border-box;font-family:var(--font-body)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .sw{display:flex;flex-direction:column;gap:10px}
  .chip{height:104px;border-radius:var(--r-lg);border:1px solid var(--hairline)}
  .nm{font-size:14px;font-weight:500;color:var(--off-black)}
  .hx{font-size:12px;color:var(--stone);letter-spacing:0.02em}
</style></head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--cream)"></div><div class="nm">Cream</div><div class="hx">#F5F0E8</div></div>
    <div class="sw"><div class="chip" style="background:var(--off-black)"></div><div class="nm">Off Black</div><div class="hx">#090909</div></div>
    <div class="sw"><div class="chip" style="background:var(--stone)"></div><div class="nm">Stone</div><div class="hx">#9B9590</div></div>
    <div class="sw"><div class="chip" style="background:var(--signal-green)"></div><div class="nm">Signal Green</div><div class="hx">#3E9B5D</div></div>
  </div>
</body></html>
