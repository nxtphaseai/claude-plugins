<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>

  <div class="row">
    <div class="ic"><img src="../assets/icons/icon-a.svg"></div>
    <div class="ic"><img src="../assets/icons/icon-b.svg"></div>
    <div class="ic"><img src="../assets/icons/icon-c.svg"></div>
    <div class="ic"><img src="../assets/icons/icon-d.svg"></div>
  </div>

</body></html>
